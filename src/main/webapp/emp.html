<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Add Employee</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:450px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 12px 30px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    color:#1565c0;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

input:focus{
    border-color:#1565c0;
    outline:none;
    box-shadow:0 0 5px rgba(21,101,192,.3);
}

button{
    width:100%;
    padding:13px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:6px;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0d47a1;
}

.links{
    margin-top:20px;
    text-align:center;
}

.links a{
    text-decoration:none;
    color:#1565c0;
    font-weight:bold;
}

.links a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h2>Add Employee Details</h2>

<form action="AddEmployee" method="post">

<div class="input-group">
<label>Employee ID</label>
<input type="text" name="eid" required>
</div>

<div class="input-group">
<label>First Name</label>
<input type="text" name="efname" required>
</div>

<div class="input-group">
<label>Last Name</label>
<input type="text" name="elname" required>
</div>

<div class="input-group">
<label>Salary</label>
<input type="text" name="esal" required>
</div>

<div class="input-group">
<label>Address</label>
<input type="text" name="address" required>
</div>

<button type="submit">Add Employee</button>

</form>

<div class="links">
<br>
<a href="index.html">Back to Home</a>
</div>

</div>

</body>
</html>

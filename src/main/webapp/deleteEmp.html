<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Delete Employee</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#cb2d3e,#ef473a);
}

.container{
    width:420px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    color:#d32f2f;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:8px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#d32f2f;
    box-shadow:0 0 5px rgba(211,47,47,.4);
}

button{
    width:100%;
    padding:13px;
    background:#d32f2f;
    color:white;
    border:none;
    border-radius:6px;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#b71c1c;
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    text-decoration:none;
    color:#1565c0;
    font-weight:bold;
}

.links a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h2>Delete Employee</h2>

<form action="des" method="post">

<div class="input-group">

<label>Employee ID</label>

<input type="text" name="eid" placeholder="Enter Employee ID" required>

</div>

<button type="submit">Delete Employee</button>

</form>

<div class="links">

<br>

<a href="index.html">Back to Home</a>

</div>

</div>

</body>
</html>

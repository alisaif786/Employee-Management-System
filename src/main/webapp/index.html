<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Employee Management System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
    width:450px;
    background:#ffffff;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

h1{
    color:#1565c0;
    margin-bottom:30px;
    font-size:30px;
}

p{
    color:#666;
    margin-bottom:25px;
}

a{
    display:block;
    width:100%;
    padding:15px;
    margin:15px 0;
    background:#1565c0;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
    transition:0.3s;
}

a:hover{
    background:#0d47a1;
    transform:translateY(-2px);
}

.footer{
    margin-top:20px;
    color:gray;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>Employee Management System</h1>

<p>Servlet & JSP CRUD Application</p>

<div class="footer">
Designed using HTML & CSS
</div>

</div>
